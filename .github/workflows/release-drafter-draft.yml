name: Release drafter — update draft on main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      # release-drafter v7.3.0 — see .github/pin-actions.txt
      - uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
