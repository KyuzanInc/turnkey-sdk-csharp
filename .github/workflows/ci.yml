name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: Build + test (ubuntu-latest, net8.0 runner)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v7.0.0 — see .github/pin-actions.txt
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Setup .NET 8
        # actions/setup-dotnet v6.0.0 — see .github/pin-actions.txt
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68
        with:
          dotnet-version: 8.0.x

      - name: Verify packages.lock.json is present
        run: |
          test -f src/packages.lock.json   || (echo "src/packages.lock.json missing"   && exit 1)
          test -f tests/packages.lock.json || (echo "tests/packages.lock.json missing" && exit 1)

      - name: Restore (locked-mode)
        run: dotnet restore turnkey-sdk-csharp.sln --locked-mode

      - name: Build (Release, both TFMs)
        run: dotnet build turnkey-sdk-csharp.sln -c Release --no-restore

      - name: Test (Release, with coverage)
        run: |
          dotnet test turnkey-sdk-csharp.sln -c Release --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=test-results.trx"

      # upstream-drift.yml itself only runs on a monthly schedule / manual
      # dispatch and is never a PR gate, but a quoting bug in its embedded
      # report script can otherwise sit silently broken for a month. This
      # regression test extracts and executes that script directly, so it
      # still gets PR-time coverage.
      - name: Upstream-drift report script regression test
        run: ./tools/tests/upstream-drift-report-test.sh

      - name: Action pin gate regression tests
        run: ./tools/tests/verify-action-pins-test.sh

      - name: Verify third-party action pins and manifest
        env:
          # Used by `gh api` to confirm each pinned SHA is a real commit
          # object, not an annotated tag object. Authenticating raises the
          # rate limit from the 60/hour shared across all traffic from a
          # GitHub-hosted runner's IP to 5000/hour for this job.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./tools/verify-action-pins.sh

      - name: Source checksum gate regression tests
        run: ./tools/compatibility/tests/source-checksums-test.sh

      - name: Verify pinned upstream source checksums and package set
        run: ./tools/compatibility/verify-source-checksums.sh

      # Compatibility-coverage gate: every upstream __tests__/*.ts test()
      # block must either map to a C# [Fact]/[Theory] via a /// upstream:
      # XML doc annotation, or be listed in coverage-map.na.tsv with a
      # non-empty public rationale.
      - name: Coverage map gate regression tests
        run: ./tools/compatibility/tests/coverage-map-test.sh

      - name: Coverage map gate (upstream test ↔ C# test)
        run: ./tools/compatibility/coverage-map.sh --check

      # Coverage gate. Threshold is set to 30% combined-TFM.
      # The baseline accounts for both the netstandard2.1
      # and net8.0 production assemblies (tests only target net8.0) AND
      # the System.Text.Json source-generated TypeInfo classes (most of
      # which are never executed by tests). The local single-TFM
      # net8.0-only figure is ~78% line.
      # TODOs to raise back:
      #   1. Filter the cobertura output to net8.0 only (or unify reports).
      #   2. Add targeted negative tests for
      #      Crypto.DecryptCredentialBundle / EncryptPrivateKeyToBundle /
      #      DecryptExportBundle error paths once Turnkey sample bundles
      #      are committable.
      # Formerly irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95
      # (v1.3.0). That action's own runs.using is 'docker' with
      # image: 'docker://ghcr.io/irongut/codecoveragesummary:v1.3.0' — a
      # MUTABLE image tag, not a digest. Pinning the action repo to a
      # commit SHA does not pin what actually executes, since the
      # container is pulled by tag at run time. Replaced with an inline
      # equivalent computed directly from the cobertura XML the test step
      # already produced, so the executed code is this file.
      #
      # Reproduces irongut's exact algorithm (verified against its source
      # at the pin above): read the root <coverage line-rate="..."> of
      # every matched file, average those rates UNWEIGHTED across files
      # (not a lines-covered/lines-valid weighted average — irongut does
      # `sum(line-rate) / file-count`, and this repo's single test run
      # happens to emit two byte-identical copies of the same
      # coverage.cobertura.xml under TestResults/**, so this matters),
      # and fail if the average is strictly below 30% (irongut's
      # `fail_below_min` compares with `<`, so exactly 30% passes).
      - name: Coverage gate (>=30% combined-TFM line)
        run: |
          set -euo pipefail
          files=()
          while IFS= read -r f; do
            files+=("$f")
          done < <(find TestResults -type f -name 'coverage.cobertura.xml' | sort)

          if (( ${#files[@]} == 0 )); then
            echo "::error::No coverage.cobertura.xml files found under TestResults/."
            exit 1
          fi

          awk '
            /^<coverage / {
              line = $0
              if (match(line, /line-rate="[0-9.]+"/)) {
                frag = substr(line, RSTART, RLENGTH)
                sub(/^line-rate="/, "", frag)
                sub(/"$/, "", frag)
                rate = frag + 0
                sum += rate
                count++
                printf("Coverage file: %s (line-rate=%.2f%%)\n", FILENAME, rate * 100)
              }
            }
            END {
              if (count == 0) {
                print "::error::no coverage.cobertura.xml file had a parsable <coverage line-rate=\"...\"> root element"
                exit 1
              }
              avg = sum / count
              printf("Summary: Line Rate = %.2f%% (unweighted average across %d file(s))\n", avg * 100, count)
              if (avg < 0.30) {
                printf("::error::FAIL: overall line rate %.2f%% is below the 30%% minimum threshold.\n", avg * 100)
                exit 1
              }
              printf("PASS: overall line rate %.2f%% meets the 30%% minimum threshold.\n", avg * 100)
            }
          ' "${files[@]}"

      - name: Upload coverage artifact
        # actions/upload-artifact v7.0.1 — see .github/pin-actions.txt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: coverage-report
          path: TestResults/**

  pack:
    name: dotnet pack (validation)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      # actions/checkout v7.0.0 — see .github/pin-actions.txt
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      # actions/setup-dotnet v6.0.0 — see .github/pin-actions.txt
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68
        with:
          dotnet-version: 8.0.x
      - name: Restore (locked-mode)
        run: dotnet restore turnkey-sdk-csharp.sln --locked-mode
      - name: Pack (Release)
        run: |
          dotnet pack src/turnkey-sdk-csharp.csproj -c Release \
            --no-restore --output ./artifacts \
            /p:IncludeSymbols=true \
            /p:SymbolPackageFormat=snupkg
      - name: Validate NuGet contents (strict paths, both TFMs)
        run: |
          set -euo pipefail
          NUPKG=$(find ./artifacts -maxdepth 1 -type f \
            -name 'KyuzanInc.Turnkey.Sdk.*.nupkg' ! -name '*.snupkg' \
            -print -quit)
          SNUPKG=$(find ./artifacts -maxdepth 1 -type f \
            -name 'KyuzanInc.Turnkey.Sdk.*.snupkg' -print -quit)
          test -n "$NUPKG"  || { echo "::error::nupkg missing";  exit 1; }
          test -n "$SNUPKG" || { echo "::error::snupkg missing"; exit 1; }

          nupkg_paths=$(unzip -Z1 "$NUPKG")
          echo "$nupkg_paths"
          for required_path in README.md LICENSE NOTICE LICENSES/Apache-2.0.txt \
                               lib/netstandard2.1/KyuzanInc.Turnkey.Sdk.dll \
                               lib/net8.0/KyuzanInc.Turnkey.Sdk.dll; do
            echo "$nupkg_paths" | grep -Fxq "$required_path" \
              || { echo "::error::nupkg is missing exact path '$required_path'"; exit 1; }
          done

          snupkg_paths=$(unzip -Z1 "$SNUPKG")
          echo "$snupkg_paths"
          for required_path in lib/netstandard2.1/KyuzanInc.Turnkey.Sdk.pdb \
                               lib/net8.0/KyuzanInc.Turnkey.Sdk.pdb; do
            echo "$snupkg_paths" | grep -Fxq "$required_path" \
              || { echo "::error::snupkg is missing exact path '$required_path'"; exit 1; }
          done
