# Upstream-drift detection (idempotent).
#
# Once a month, hash each retained upstream source file at the pinned
# Git commit via the GitHub
# Contents API, then compare to the local pin in
# tests/UpstreamSources/source-file-checksums.txt.
#
#   - This workflow is NOT a main-branch CI gate. It can never block
#     a PR. Drift surfaces only as a GitHub issue.
#   - Issue creation is idempotent: at most ONE open issue with the
#     `upstream-drift` label and the package name in the title. A
#     re-detected drift updates the body and posts a re-detection
#     comment instead of opening a duplicate.
#
# Manual trigger via workflow_dispatch is supported so reviewers can
# re-run after re-pinning without waiting for the next cron tick.

name: Upstream drift detection

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 1 * *"  # 1st of each month, 08:00 UTC

permissions:
  contents: read
  issues: write

jobs:
  drift:
    name: Drift detection (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: turnkey-crypto-2.8.8
            owner: tkhq
            repo: sdk
            git_tag_sha: b35dc642bd7c1728f97acd43d4cba66976b65084
            tarball_dir: packages/crypto
            npm_package: "@turnkey/crypto"
            npm_version: "2.8.8"
          - package: turnkey-http-3.16.0
            owner: tkhq
            repo: sdk
            git_tag_sha: 8def9ba521233137437ac7294693a4ae0a0d14da
            tarball_dir: packages/http
            npm_package: "@turnkey/http"
            npm_version: "3.16.0"
          - package: turnkey-api-key-stamper-0.5.0
            owner: tkhq
            repo: sdk
            git_tag_sha: b711befbb88ec522452dbdac68f0e98762be10dd
            tarball_dir: packages/api-key-stamper
            npm_package: "@turnkey/api-key-stamper"
            npm_version: "0.5.0"
          - package: turnkey-encoding-0.6.0
            owner: tkhq
            repo: sdk
            git_tag_sha: 60a997f4c52ac5f98bdd285af934f02699b88bff
            tarball_dir: packages/encoding
            npm_package: "@turnkey/encoding"
            npm_version: "0.6.0"
    steps:
      # actions/checkout v7.0.0 — see .github/pin-actions.txt
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Verify retained source manifest
        run: ./tools/compatibility/verify-source-checksums.sh

      # docs/compatibility/upstream-pins.md calls the npm tarball SHA-256
      # in tests/UpstreamSources/package-checksums.txt the compatibility
      # authority, but nothing previously fetched the real npm registry to
      # confirm those hashes still match what's published. This does not
      # block PRs (this workflow never does — see the header comment); it
      # surfaces as a drift issue via the same idempotent mechanism as the
      # TypeScript source-drift check below.
      #
      # The registry's own `dist.integrity` is SHA-512 (SRI-encoded), not
      # SHA-256, so it is not directly comparable to our recorded hash;
      # this downloads the actual tarball and hashes it, which is exactly
      # what the documented re-pinning procedure
      # (docs/compatibility/upstream-pins.md, "Re-pinning procedure",
      # step 1-2: `npm pack` + record the tarball SHA-256) already does by
      # hand. This automates that same check periodically.
      - name: Verify npm tarball SHA-256 against package-checksums.txt
        id: tarball
        env:
          PACKAGE: ${{ matrix.package }}
          NPM_PACKAGE: ${{ matrix.npm_package }}
          NPM_VERSION: ${{ matrix.npm_version }}
        run: |
          set -euo pipefail

          expected_sha=$(awk -v want="${PACKAGE}.tgz" \
            '$2 == want { print $1; found=1 } END { exit found ? 0 : 1 }' \
            tests/UpstreamSources/package-checksums.txt) \
            || { echo "::error::${PACKAGE}.tgz not found in tests/UpstreamSources/package-checksums.txt" >&2; exit 1; }

          registry_url="https://registry.npmjs.org/${NPM_PACKAGE}/${NPM_VERSION}"
          metadata=$(mktemp)
          http_status=$(curl --silent --show-error --location \
            --output "$metadata" --write-out '%{http_code}' \
            "$registry_url")
          if [[ "$http_status" != "200" ]]; then
            echo "::error::npm registry returned HTTP ${http_status} for ${registry_url}" >&2
            exit 1
          fi

          tarball_url=$(jq -r '.dist.tarball // empty' "$metadata")
          rm -f "$metadata"
          if [[ -z "$tarball_url" ]]; then
            echo "::error::npm registry metadata for ${registry_url} has no dist.tarball" >&2
            exit 1
          fi

          tarball=$(mktemp)
          curl --silent --show-error --location --fail --output "$tarball" "$tarball_url"
          actual_sha=$(shasum -a 256 "$tarball" | awk '{print $1}')
          rm -f "$tarball"

          # A hash mismatch is DRIFT, not an infrastructure failure. Do not hard
          # exit here: that would abort the job before the drift-report and
          # issue-upsert steps, leaving only a failed Actions run and never the
          # tracking issue this workflow promises. Record it as an output that
          # the "Compute drift report" step folds into the same report/issue.
          # Registry/transport failures above still exit non-zero, since those
          # are not drift.
          if [[ "$actual_sha" != "$expected_sha" ]]; then
            echo "::warning::npm tarball SHA-256 mismatch for ${NPM_PACKAGE}@${NPM_VERSION}: expected ${expected_sha}, got ${actual_sha} (source: ${tarball_url})"
            {
              echo "TARBALL_DRIFT=1"
              echo "TARBALL_EXPECTED=${expected_sha}"
              echo "TARBALL_ACTUAL=${actual_sha}"
              echo "TARBALL_SOURCE=${tarball_url}"
            } >> "$GITHUB_OUTPUT"
          else
            echo "npm tarball SHA-256 verified for ${NPM_PACKAGE}@${NPM_VERSION}: ${actual_sha}"
          fi

      # The pin file format is "<sha256>  <relpath>" where <relpath>
      # always starts with "tests/UpstreamSources/".
      # We need to convert that to the GitHub Contents API path which
      # is "<tarball_dir>/src/__tests__/<file>" — the live upstream
      # GitHub tree does not have a "ts-source" prefix.
      #
      # Concretely the local path looks like:
      #   tests/UpstreamSources/turnkey-crypto-2.8.8/ts-source/__tests__/crypto-test.ts
      # and the upstream path is:
      #   packages/crypto/src/__tests__/crypto-test.ts
      #
      # The mapping is per-package because monorepo layouts vary.
      - name: Compute drift report
        id: drift
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE: ${{ matrix.package }}
          OWNER: ${{ matrix.owner }}
          REPO: ${{ matrix.repo }}
          GIT_SHA: ${{ matrix.git_tag_sha }}
          TARBALL_DIR: ${{ matrix.tarball_dir }}
          NPM_PACKAGE: ${{ matrix.npm_package }}
          NPM_VERSION: ${{ matrix.npm_version }}
          # Passed via env, never interpolated into the script body, so a
          # registry-supplied value cannot inject shell.
          TARBALL_DRIFT: ${{ steps.tarball.outputs.TARBALL_DRIFT }}
          TARBALL_EXPECTED: ${{ steps.tarball.outputs.TARBALL_EXPECTED }}
          TARBALL_ACTUAL: ${{ steps.tarball.outputs.TARBALL_ACTUAL }}
          TARBALL_SOURCE: ${{ steps.tarball.outputs.TARBALL_SOURCE }}
        run: |
          set -euo pipefail

          REPORT=$(mktemp)
          : > "$REPORT"
          API_RESPONSE=$(mktemp)

          drift_count=0
          matched_count=0

          # Fold a tarball-hash mismatch (recorded by the previous step) into the
          # same report so it reaches the tracking issue rather than only a
          # failed run. This is package-level drift, distinct from the per-file
          # source drift computed below.
          if [[ "${TARBALL_DRIFT:-0}" == "1" ]]; then
            {
              echo "- **TARBALL_DRIFT**: published npm tarball hash changed for \`${NPM_PACKAGE}@${NPM_VERSION}\`"
              echo "  - expected sha256 \`${TARBALL_EXPECTED}\`"
              echo "  - live sha256     \`${TARBALL_ACTUAL}\`"
              echo "  - source          \`${TARBALL_SOURCE}\`"
            } >> "$REPORT"
            drift_count=$((drift_count + 1))
          fi

          while IFS= read -r line; do
            # Skip comments and blank lines.
            [[ -z "${line// }" ]] && continue
            [[ "$line" =~ ^# ]] && continue

            # Format: "<sha256>  <relpath>"
            expected_sha=$(awk '{print $1}' <<<"$line")
            relpath=$(awk '{print $2}' <<<"$line")

            # Filter to this matrix package only.
            case "$relpath" in
              "tests/UpstreamSources/${PACKAGE}/"*) ;;
              *) continue ;;
            esac

            # Strip the local prefix to derive the in-tarball relative path.
            local_subpath="${relpath#tests/UpstreamSources/${PACKAGE}/}"

            # This Git-source loop compares retained ts-source files against the
            # live upstream Git tree. It only handles the ts-source subtree.
            # Other retained rows (each package's package.json) are published npm
            # metadata: npm normalizes those bytes (adds _id/dist/gitHead, may
            # reorder fields) relative to the Git-tree copy, so comparing them
            # here would report permanent false DRIFT. They stay pinned for local
            # checksum verification (source-file-checksums.txt) and are covered
            # by the npm-tarball SHA-256 step above; skip them here.
            case "$local_subpath" in
              ts-source/*) ;;
              *) continue ;;
            esac
            matched_count=$((matched_count + 1))

            # Rewrite "ts-source" -> "src" for the live upstream layout.
            upstream_subpath=${local_subpath/ts-source\//src/}

            # Read the live file via the Contents API at the pinned SHA.
            # Distinguish a genuine 404 (drift) from authentication, rate-limit,
            # transport, and server failures (workflow failure).
            api_url="https://api.github.com/repos/${OWNER}/${REPO}/contents/${TARBALL_DIR}/${upstream_subpath}"
            http_status=$(curl --silent --show-error --location \
              --output "$API_RESPONSE" \
              --write-out '%{http_code}' \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --get \
              --data-urlencode "ref=${GIT_SHA}" \
              "$api_url")

            if [[ "$http_status" == "404" ]]; then
              {
                echo "- **MISSING_UPSTREAM**: \`${upstream_subpath}\` (not found at ${OWNER}/${REPO}@${GIT_SHA})";
              } >> "$REPORT"
              drift_count=$((drift_count + 1))
              continue
            fi
            if [[ "$http_status" != "200" ]]; then
              echo "::error::GitHub Contents API returned HTTP ${http_status} for ${OWNER}/${REPO}@${GIT_SHA}:${upstream_subpath}" >&2
              exit 1
            fi
            if ! jq -e '.encoding == "base64" and (.content | type == "string")' \
              "$API_RESPONSE" >/dev/null; then
              echo "::error::GitHub Contents API returned an unexpected payload for ${OWNER}/${REPO}@${GIT_SHA}:${upstream_subpath}" >&2
              exit 1
            fi
            live_b64=$(jq -r '.content' "$API_RESPONSE")

            # Contents API base64-decodes with embedded newlines.
            live_sha=$(printf '%s' "$live_b64" | tr -d '\n' | base64 -d | shasum -a 256 | awk '{print $1}')

            if [[ "$live_sha" != "$expected_sha" ]]; then
              {
                echo "- **DRIFT**: \`${upstream_subpath}\`"
                echo "  - expected sha256 \`${expected_sha}\`"
                echo "  - live sha256     \`${live_sha}\`"
                echo "  - live ref        \`${OWNER}/${REPO}@${GIT_SHA}\`"
              } >> "$REPORT"
              drift_count=$((drift_count + 1))
            fi
          done < tests/UpstreamSources/source-file-checksums.txt

          rm -f "$API_RESPONSE"

          if [[ "$matched_count" -eq 0 ]]; then
            echo "::error::checksum manifest has no retained source rows for ${PACKAGE}; refusing to update issues" >&2
            exit 1
          fi

          {
            echo "DRIFT_COUNT=$drift_count"
            echo "REPORT_PATH=$REPORT"
          } >> "$GITHUB_OUTPUT"

      # Idempotent issue handling:
      #   - Search for an open issue labelled `upstream-drift` whose
      #     title contains the package name.
      #   - If found: edit the body to the latest report and add a
      #     re-detection comment with the timestamp.
      #   - If not found: open a new issue.
      #   - If drift_count is 0 and an open issue exists: close it
      #     with a "resolved" comment.
      - name: Upsert drift issue
        if: ${{ steps.drift.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRIFT_LABEL: upstream-drift
          PACKAGE: ${{ matrix.package }}
          DRIFT_COUNT: ${{ steps.drift.outputs.DRIFT_COUNT }}
          REPORT_PATH: ${{ steps.drift.outputs.REPORT_PATH }}
        run: |
          set -euo pipefail

          if [[ ! "$DRIFT_COUNT" =~ ^[0-9]+$ ]]; then
            echo "::error::invalid or missing DRIFT_COUNT; refusing to update issues" >&2
            exit 1
          fi
          if [[ -z "$REPORT_PATH" || ! -f "$REPORT_PATH" ]]; then
            echo "::error::missing drift report; refusing to update issues" >&2
            exit 1
          fi

          gh label create "$DRIFT_LABEL" --color "d73a4a" \
            --description "Pinned upstream source sha256 drift detected" 2>/dev/null || true

          # Build the body up-front so the rest of the logic is single-shot.
          if [[ "$DRIFT_COUNT" -gt 0 ]]; then
            BODY_FILE=$(mktemp)
            {
              echo "Detected $DRIFT_COUNT drift row(s) for package \`$PACKAGE\` at $(date -u +%FT%TZ)."
              echo ""
              echo "## Drift"
              echo ""
              cat "$REPORT_PATH"
              echo ""
              echo "## Re-pin procedure"
              echo ""
              echo "See \`docs/compatibility/upstream-pins.md\` (\"Re-pinning procedure\")."
            } > "$BODY_FILE"
          fi

          # Locate the single existing open issue (idempotent).
          EXISTING=$(gh issue list \
            --state open \
            --label "$DRIFT_LABEL" \
            --search "in:title $PACKAGE" \
            --json number \
            --jq '.[0].number // empty')

          if [[ "$DRIFT_COUNT" -gt 0 ]]; then
            if [[ -n "$EXISTING" ]]; then
              gh issue edit "$EXISTING" --body-file "$BODY_FILE"
              gh issue comment "$EXISTING" --body \
                "Re-detected upstream drift on $(date -u +%FT%TZ)."
            else
              gh issue create \
                --label "$DRIFT_LABEL" \
                --title "Upstream drift: $PACKAGE" \
                --body-file "$BODY_FILE"
            fi
          else
            if [[ -n "$EXISTING" ]]; then
              gh issue comment "$EXISTING" --body \
                "Drift resolved (re-checked $(date -u +%FT%TZ))."
              gh issue close "$EXISTING"
            else
              echo "No drift detected and no open issue. Nothing to do."
            fi
          fi
